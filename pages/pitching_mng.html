    <div class="container mt-4">

    <h4 class="mb-3">Laporan Pitching Management</h4>

    <!-- FILTER -->
    <div class="row mb-3">

        <div class="col-6 col-md-3">
            <label>From</label>
            <input type="date" id="filterFrom" class="form-control">
        </div>

        <div class="col-6 col-md-3">
            <label>To</label>
            <input type="date" id="filterTo" class="form-control">
        </div>

        <div class="col-6 col-md-3">
            <label>Filter Admin</label>
            <select id="filterAdmin" class="form-select">
            <option value="">All Admin</option>
            </select>
        </div>

        <div class="col-6 col-md-3">
            <label>Status</label>
            <select id="filterStatus" class="form-select">
                <option value="">All Status</option>
                <option value="Pitching">Pitching</option>
                <option value="Respon">Respon</option>
                <option value="Follow Up">Follow Up</option>
                <option value="Deal">Deal</option>
            </select>
        </div>
    </div>


    <!-- TABLE -->
    <div class="table-responsive">
        <table id="pitchingTableManagement" class="table table-striped table-bordered align-middle tblfixed">
        <thead class="table-dark">
            <tr>
            <th>Brand</th>
            <th>KOL</th>
            <th>Admin</th>
            <th>Markom</th>
            <th>Phone</th>
            <th>Status</th>

            <th>Pitching Date</th>
            <th>Respon Date</th>
            <th>Follow Up Date</th>
            <th>Deal Date</th>

            <th>Notes</th>
            <th>Action</th>
            </tr>
        </thead>
        </table>
    </div>

    </div>


    <!-- ================= MODAL EDIT ================= -->
    <div class="modal fade" id="pitchingModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

        <div class="modal-header">
            <h5 class="modal-title">Edit Pitching</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

            <form id="pitchingForm">

            <input type="hidden" id="pitchingId">

            <!-- BRAND -->
            <div class="mb-3">
                <label>Brand</label>
                <select id="brandSelect" class="form-select" required></select>
            </div>

            <!-- MARKOM -->
            <div class="mb-3">
                <label>Nama Markom</label>
                <input type="text" id="markomName" class="form-control" required>
            </div>

            <!-- PHONE -->
            <div class="mb-3">
                <label>No. HP</label>
                <input type="text" id="markomPhone" class="form-control" required>
            </div>

            <hr>

            <!-- PITCHING -->
            <div class="mb-3">
                <label>Pitching Date</label>
                <input type="date" id="pitchingDate" class="form-control" required>
            </div>

            <!-- RESPON -->
            <div class="mb-3">
                <label>Respon Date</label>
                <input type="date" id="responDate" class="form-control">
            </div>

            <!-- FOLLOW UP -->
            <div class="mb-3">
                <label>Follow Up Date</label>
                <input type="date" id="followupDate" class="form-control">
            </div>

            <!-- DEAL -->
            <div class="mb-3">
                <label>Deal Date</label>
                <input type="date" id="dealDate" class="form-control">
            </div>

            <!-- NOTES -->
            <div class="mb-3">
                <label>Notes</label>
                <textarea id="notes" class="form-control" rows="3"></textarea>
            </div>

            <!-- SUBMIT -->
            <button type="submit" class="btn btn-primary w-100">
                Simpan Perubahan
            </button>

            </form>

        </div>

        </div>
    </div>
    </div>
