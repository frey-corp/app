<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Master Brand</h4>

    <div class="d-flex gap-2">
      <!-- FILTER -->
      <select id="statusFilter" class="form-select">
        <option value="">ALL</option>
        <option value="1">Active</option>
        <option value="2">Inactive</option>
      </select>

      <button class="btn btn-primary" id="addBrandBtn">
        + Add Brand
      </button>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0 table-responsive">
      <table class="table table-bordered table-striped tblfixed" id="brandTable" width="100%">
        <thead class="table-dark">
          <tr>
            <th width="60">No</th>
            <th>Brand Name</th>
            <th>Brand Address</th>
            <th>Brand PIC</th>
            <th width="120">Status</th>
            <th width="120">Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="brandModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Brand</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="brandForm">
          <input type="hidden" id="brandId">

          <div class="mb-3">
            <label class="form-label">Brand Name</label>
            <input type="text" class="form-control" id="brandName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Brand Address</label>
            <input type="text" class="form-control" id="brandAddress" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Brand PIC</label>
            <input type="text" class="form-control" id="brandPIC" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" id="brandStatus">
              <option value="1">Active</option>
              <option value="2">Inactive</option>
            </select>
          </div>

          <div class="text-end">
            <button type="submit" class="btn btn-primary">
              Save
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
