<div class="container mt-4">

  <!-- FILTER -->

    <div class="col-6 col-md-4">
        <label>From</label>
        <input type="date" id="filterFrom" class="form-control">
    </div>

    <div class="col-6 col-md-4">
        <label>To</label>
        <input type="date" id="filterTo" class="form-control">
    </div>

  </div>

  <!-- TABLE -->
  <div class="table-responsive">
    <table id="pitchingTableKol" class="table table-striped table-bordered align-middle tblfixed">
      <thead class="table-dark">
        <tr>
          <th>Brand</th>
          <th>Status</th>

          <th>Pitching Date</th>
          <th>Respon Date</th>
          <th>Follow Up Date</th>
          <th>Deal Date</th>

          <th>Notes</th>
        </tr>
      </thead>
    </table>
  </div>

</div>
