<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 360px;">
        <div class="text-center mb-3">
            <img src="./assets/images/logofreycorp.jpeg" alt="Frey Corp" width="100">
            <h4 class="mt-2">Frey Corp Login</h4>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Masukkan username">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Masukkan password">
            </div>

            <div class="mb-3 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" id="rememberMe" class="form-check-input">
                    <label for="rememberMe" class="form-check-label">Remember Me</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" id="show" class="form-check-input">
                    <label for="show" class="form-check-label">Show</label>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
</div>
