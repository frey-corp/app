<div class="container mt-4">
  <h3>Manage Users</h3>

  <button id="btnAddUser" class="btn btn-primary mb-3">Add User</button>

  <div class="card-body table-responsive p-0">
      <table class="table table-bordered table-striped tblfixed" id="usersTable" width="100%">
        <thead class="table-dark">
      <tr>
        <th>No</th>
        <th>Username</th>
        <th>Full Name</th>
        <th>Role</th>
        <th>Instagram</th>
        <th>TikTok</th>
        <th>WhatsApp</th>
        <th>Bank</th>
        <th>Bank Account</th>
        <th>Alamat</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  </div>    

  <!-- Modal Add/Edit User -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="userForm">
          <div class="modal-header">
            <h5 class="modal-title" id="userModalTitle">Add User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="userId">

            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="text" id="password" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name</label>
              <input type="text" id="fullName" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="role" class="form-label">Role</label>
              <select id="role" class="form-select" required>
                <option value="2">Admin</option>
                <option value="3">KOL</option>
                <option value="1">Management</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="alamat" class="form-label">Alamat</label>
              <textarea id="alamat" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
              <label for="instagram" class="form-label">Instagram</label>
              <input type="text" id="instagram" class="form-control">
            </div>
            <div class="mb-3">
              <label for="tiktok" class="form-label">TikTok</label>
              <input type="text" id="tiktok" class="form-control">
            </div>
            <div class="mb-3">
              <label for="whatsapp" class="form-label">WhatsApp</label>
              <input type="text" id="whatsapp" class="form-control">
            </div>
            <div class="mb-3">
              <label for="bankName" class="form-label">Bank Name</label>
              <input type="text" id="bankName" class="form-control">
            </div>
            <div class="mb-3">
              <label for="bankAccount" class="form-label">Bank Account Number</label>
              <input type="text" id="bankAccount" class="form-control">
            </div>
            <div class="mb-3">
              <label for="isActive" class="form-label">Status</label>
              <select id="isActive" class="form-select">
                <option value="1">Active</option>
                <option value="2">Inactive</option>
              </select>
            </div>

          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
